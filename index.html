<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>World Cup 2026 Tipping</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0a0e1a;
  --surface: #111827;
  --surface2: #1a2235;
  --surface3: #222d42;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.15);
  --gold: #f5c518;
  --gold2: #e0a800;
  --red: #e63946;
  --green: #2ec4b6;
  --blue: #3a86ff;
  --purple: #7b5ea7;
  --text: #f0f4ff;
  --text2: #8899bb;
  --text3: #556080;
  --correct: #2ec4b6;
  --incorrect: #e63946;
  --r: 10px;
  --r2: 16px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;font-size:15px;line-height:1.5}
body{min-height:100vh;background:var(--bg)}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% -10%, rgba(59,134,255,0.12) 0%, transparent 60%);pointer-events:none;z-index:0}

.app{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column}

/* NAV */
.topbar{background:rgba(10,14,26,0.95);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100;backdrop-filter:blur(8px)}
.topbar-logo{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;color:var(--gold)}
.topbar-logo span{color:var(--text2);font-size:16px;letter-spacing:1px;margin-left:8px}
.topbar-nav{display:flex;gap:4px}
.nav-btn{background:none;border:none;color:var(--text2);padding:8px 14px;cursor:pointer;font-family:'Barlow',sans-serif;font-size:13px;font-weight:500;border-radius:6px;transition:all 0.15s;letter-spacing:0.3px}
.nav-btn:hover{color:var(--text);background:var(--surface2)}
.nav-btn.active{color:var(--gold);background:rgba(245,197,24,0.08)}

/* MAIN */
.main{flex:1;padding:2rem;max-width:1100px;margin:0 auto;width:100%}

/* HOME */
.hero{text-align:center;padding:3rem 0 2rem}
.hero h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(48px,8vw,96px);letter-spacing:4px;line-height:1;color:var(--text)}
.hero h1 span{color:var(--gold)}
.hero-sub{color:var(--text2);font-size:16px;margin-top:12px;max-width:500px;margin-left:auto;margin-right:auto}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:2rem 0}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:1.25rem;text-align:center}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:40px;color:var(--gold);line-height:1}
.stat-label{color:var(--text2);font-size:12px;letter-spacing:1px;text-transform:uppercase;margin-top:4px}
.entry-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:2rem;max-width:420px;margin:0 auto}
.entry-card h2{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:600;margin-bottom:1rem;letter-spacing:0.5px}
input[type=text],input[type=password],input[type=number]{width:100%;padding:10px 14px;background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r);color:var(--text);font-family:'Barlow',sans-serif;font-size:14px;outline:none;transition:border 0.15s}
input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(245,197,24,0.1)}
.btn{padding:10px 20px;border:1px solid var(--border2);border-radius:var(--r);cursor:pointer;font-family:'Barlow',sans-serif;font-size:14px;font-weight:600;transition:all 0.15s;letter-spacing:0.3px}
.btn-gold{background:var(--gold);color:#000;border-color:var(--gold)}
.btn-gold:hover{background:var(--gold2)}
.btn-outline{background:transparent;color:var(--text);border-color:var(--border2)}
.btn-outline:hover{background:var(--surface2)}
.btn-sm{padding:6px 14px;font-size:12px}
.btn-danger{background:rgba(230,57,70,0.15);color:var(--red);border-color:rgba(230,57,70,0.3)}
.btn-danger:hover{background:rgba(230,57,70,0.25)}
.btn:disabled{opacity:0.4;cursor:default}
.admin-link{text-align:center;margin-top:1.5rem}
.admin-link button{background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;text-decoration:underline;font-family:'Barlow',sans-serif}
.admin-link button:hover{color:var(--text2)}
.err{color:var(--red);font-size:13px;margin-top:8px}
.success-msg{color:var(--correct);font-size:13px;margin-top:8px}

/* TIPPER */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:8px}
.section-header h2{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase}
.badge-gold{background:rgba(245,197,24,0.15);color:var(--gold);border:1px solid rgba(245,197,24,0.3)}
.badge-green{background:rgba(46,196,182,0.15);color:var(--correct);border:1px solid rgba(46,196,182,0.3)}
.badge-red{background:rgba(230,57,70,0.15);color:var(--red);border:1px solid rgba(230,57,70,0.3)}
.badge-blue{background:rgba(58,134,255,0.15);color:var(--blue);border:1px solid rgba(58,134,255,0.3)}
.tab-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.25rem}
.tab{padding:6px 14px;border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:13px;color:var(--text2);background:none;font-family:'Barlow',sans-serif;font-weight:500;transition:all 0.15s;white-space:nowrap}
.tab:hover{border-color:var(--border2);color:var(--text)}
.tab.active{background:rgba(245,197,24,0.1);border-color:rgba(245,197,24,0.4);color:var(--gold)}
.tab.done{border-color:rgba(46,196,182,0.3);color:var(--correct)}

/* MATCH CARD */
.group-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;margin-bottom:1rem}
.group-card-header{background:var(--surface2);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.group-card-header span{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;letter-spacing:1px;color:var(--gold);text-transform:uppercase}
.match-row{display:grid;grid-template-columns:1fr 180px 1fr;align-items:center;padding:12px 20px;border-bottom:1px solid var(--border);gap:10px}
.match-row:last-of-type{border-bottom:none}
.team-name{font-size:14px;font-weight:500}
.team-name.right{text-align:right}
.pick-group{display:flex;flex-direction:column;align-items:center;gap:6px}
.pick-score{font-size:11px;color:var(--gold);font-weight:600;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px}
.pick-btns{display:flex;gap:4px}
.pick-btn{padding:5px 12px;border:1px solid var(--border2);border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;background:none;color:var(--text2);font-family:'Barlow Condensed',sans-serif;letter-spacing:0.5px;transition:all 0.15s}
.pick-btn:hover:not(:disabled){border-color:var(--border2);background:var(--surface3)}
.pick-btn:disabled{opacity:0.35;cursor:default}
.pick-btn.sel-home{background:rgba(58,134,255,0.2);border-color:var(--blue);color:var(--blue)}
.pick-btn.sel-draw{background:rgba(245,197,24,0.2);border-color:var(--gold);color:var(--gold)}
.pick-btn.sel-away{background:rgba(230,57,70,0.2);border-color:var(--red);color:var(--red)}
.lock-bar{padding:16px 20px;background:var(--surface2);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.lock-hint{font-size:12px;color:var(--text3)}

/* KNOCKOUT */
.ko-intro{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:1.5rem;margin-bottom:1.5rem}
.ko-intro p{color:var(--text2);font-size:14px;line-height:1.7}
.ko-scoring{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.ko-round-section{margin-bottom:2rem}
.ko-round-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;margin-bottom:1rem;display:flex;align-items:center;gap:10px}
.ko-round-title .pts{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;color:var(--text3);letter-spacing:1px}
.ko-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
.ko-match{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:14px;transition:border 0.15s}
.ko-match:hover{border-color:var(--border2)}
.ko-match-label{font-size:11px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;font-weight:600}
.ko-pick-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);cursor:pointer;border-radius:6px;padding:6px 8px;transition:background 0.1s}
.ko-pick-row:last-child{border-bottom:none}
.ko-pick-row:hover:not(.locked-pick){background:var(--surface2)}
.ko-pick-row.selected{background:rgba(245,197,24,0.1);border:1px solid rgba(245,197,24,0.3);border-radius:6px}
.ko-pick-row.locked-pick{cursor:default}
.ko-team-dot{width:8px;height:8px;border-radius:50%;background:var(--border2);flex-shrink:0}
.ko-team-dot.sel{background:var(--gold)}
.ko-team-name{font-size:13px;font-weight:500;flex:1}
.ko-lock-row{margin-top:10px}

/* ADMIN */
.admin-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem}
.admin-match-row{display:grid;grid-template-columns:1fr 100px 1fr;align-items:center;padding:10px 16px;border-bottom:1px solid var(--border);gap:8px;font-size:13px}
.admin-match-row:last-child{border-bottom:none}
.score-pair{display:flex;gap:6px;align-items:center;justify-content:center}
.score-pair input{width:44px;padding:5px;text-align:center;font-size:15px;font-weight:600;font-family:'Barlow Condensed',sans-serif}
.score-sep{color:var(--text3);font-size:14px}

/* LEADERBOARD */
.lb-row{display:grid;grid-template-columns:36px 1fr 60px 60px 60px;align-items:center;padding:10px 16px;border-bottom:1px solid var(--border);gap:8px;font-size:13px}
.lb-row.header{font-size:11px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid var(--border2)}
.lb-row:last-child{border-bottom:none}
.lb-rank{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--text3)}
.lb-rank.top{color:var(--gold)}
.lb-pts{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;text-align:center}

/* PICKS TABLE */
.picks-scroll{overflow-x:auto;border-radius:var(--r2)}
.picks-table{width:100%;border-collapse:collapse;font-size:12px}
.picks-table th{padding:8px 10px;text-align:left;background:var(--surface2);color:var(--text3);font-size:11px;letter-spacing:1px;text-transform:uppercase;white-space:nowrap;border-bottom:1px solid var(--border)}
.picks-table td{padding:7px 10px;border-bottom:1px solid var(--border);white-space:nowrap}
.picks-table tr:hover td{background:var(--surface2)}
.c-correct{background:rgba(46,196,182,0.2);color:var(--correct);border-radius:4px;padding:1px 6px;font-weight:600}
.c-incorrect{background:rgba(230,57,70,0.2);color:var(--red);border-radius:4px;padding:1px 6px}
.c-pending{color:var(--text3)}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r2);padding:2rem;max-width:400px;width:100%}
.modal h2{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;margin-bottom:1rem}

/* ALERT */
.alert{padding:10px 16px;border-radius:var(--r);font-size:13px;margin-top:8px}
.alert-success{background:rgba(46,196,182,0.1);border:1px solid rgba(46,196,182,0.3);color:var(--correct)}
.alert-warning{background:rgba(245,197,24,0.1);border:1px solid rgba(245,197,24,0.3);color:var(--gold)}

.all-locked-banner{background:linear-gradient(135deg,rgba(46,196,182,0.15),rgba(58,134,255,0.1));border:1px solid rgba(46,196,182,0.3);border-radius:var(--r2);padding:1.5rem;text-align:center;margin-top:1rem}
.all-locked-banner h3{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:var(--correct)}
.all-locked-banner p{color:var(--text2);font-size:14px;margin-top:6px}

@media(max-width:600px){
  .main{padding:1rem}
  .match-row{grid-template-columns:1fr 160px 1fr;padding:10px 12px;gap:6px}
  .admin-grid{grid-template-columns:1fr}
  .lb-row{grid-template-columns:32px 1fr 50px 50px 50px}
}
</style>
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
</head>
<body>
<div class="app" id="app">
  <div class="topbar">
    <div class="topbar-logo">WC2026 <span>TIPPING</span></div>
    <div class="topbar-nav" id="topbar-nav"></div>
  </div>
  <div class="main" id="main-content"></div>
</div>

<script>
const GROUPS = {
  A:['Mexico','South Korea','South Africa','Czechia'],
  B:['Canada','Switzerland','Qatar','Bosnia & Herz.'],
  C:['Brazil','Morocco','Scotland','Haiti'],
  D:['USA','Paraguay','Australia','Turkiye'],
  E:['Germany','Curacao','Ivory Coast','Ecuador'],
  F:['Netherlands','Japan','Tunisia','Sweden'],
  G:['Belgium','Iran','Egypt','New Zealand'],
  H:['Spain','Uruguay','Saudi Arabia','Cape Verde'],
  I:['France','Senegal','Norway','Iraq'],
  J:['Argentina','Austria','Algeria','Jordan'],
  K:['Portugal','Colombia','Uzbekistan','DR Congo'],
  L:['England','Croatia','Panama','Ghana']
};

const KO_ROUNDS = [
  {id:'r32', label:'Round of 32', pts:1, count:32},
  {id:'r16', label:'Round of 16', pts:1, count:16},
  {id:'qf',  label:'Quarter-finals', pts:3, count:4},
  {id:'sf',  label:'Semi-finals', pts:3, count:2},
  {id:'f',   label:'Final', pts:5, count:1},
];

function getMatches(g) {
  const t = GROUPS[g];
  return [
    {id:`${g}1`,home:t[0],away:t[1]},
    {id:`${g}2`,home:t[0],away:t[2]},
    {id:`${g}3`,home:t[0],away:t[3]},
    {id:`${g}4`,home:t[1],away:t[2]},
    {id:`${g}5`,home:t[1],away:t[3]},
    {id:`${g}6`,home:t[2],away:t[3]},
  ];
}

const ADMIN_PASS = 'admin2026';
const STORE_KEY = 'wc2026_tipping_v2';
const CLOUD_KEY = 'wc2026_cloud_v2';

const LOCK_DATE = new Date('2026-06-11T00:00:00');

// ── Firebase Realtime Database ────────────────────────────────────────────────
// SETUP: Replace the firebaseConfig below with your own project's config.
// 1. Go to https://console.firebase.google.com
// 2. Create a project → Add a web app → copy the firebaseConfig object
// 3. Go to Realtime Database → Create database → start in test mode
// 4. Paste your config values below (replacing the placeholder strings)
const firebaseConfig = {
  apiKey:            "AIzaSyC2GHrQUQXMCYNUUZLtPJOzkyLnt48KDl8",
  authDomain:        "world-cup-5765b.firebaseapp.com",
  databaseURL:       "https://world-cup-5765b-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "world-cup-5765b",
  storageBucket:     "world-cup-5765b.firebasestorage.app",
  messagingSenderId: "938530127707",
  appId:             "1:938530127707:web:f4a32895fe09a9978d647e"
};
};

const FB_PATH = 'wc2026_tipping_v2';
let _db = null;
let _cloudSaveTimer = null;
let _firebaseReady = false;

function initFirebase() {
  if (typeof firebase === 'undefined') return;
  if (!firebaseConfig.databaseURL || firebaseConfig.databaseURL.startsWith('REPLACE')) return;
  try {
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    _db = firebase.database();
    _firebaseReady = true;
  } catch(e) { console.warn('Firebase init failed:', e); }
}

function buildSaveData() {
  return {
    picks:S.picks, lockedGroups:S.lockedGroups,
    koPicks:S.koPicks, koLocked:S.koLocked,
    scores:S.scores, koScores:S.koScores,
    tippingOpen:S.tippingOpen,
    entryDates:S.entryDates,
    finishedTippers:S.finishedTippers
  };
}

async function cloudSave(data) {
  if (!_firebaseReady || !_db) return;
  try {
    await _db.ref(FB_PATH).set(data);
  } catch(e) { console.warn('Firebase save failed:', e); }
}

async function cloudLoad() {
  if (!_firebaseReady || !_db) return null;
  try {
    const snap = await _db.ref(FB_PATH).get();
    if (snap.exists()) return snap.val();
  } catch(e) { console.warn('Firebase load failed:', e); }
  return null;
}

let S = {
  view: 'home',
  tipperName: '',
  adminAuthed: false,
  adminTab: 'scores',
  adminGroup: 'A',
  tipperGroup: 'A',
  tipperTab: 'groups',
  picks: {},
  lockedGroups: {},
  koPicks: {},
  koLocked: {},
  scores: {},
  koScores: {},
  tippingOpen: true,
  entryDates: {},       // name -> ISO date string when they first entered
  finishedTippers: {},  // name -> true when they click Finish
};

function isTippingLocked() {
  return !S.tippingOpen || new Date() >= LOCK_DATE;
}

function applyData(d) {
  S.picks = d.picks || {};
  S.lockedGroups = d.lockedGroups || {};
  S.koPicks = d.koPicks || {};
  S.koLocked = d.koLocked || {};
  S.scores = d.scores || {};
  S.koScores = d.koScores || {};
  S.tippingOpen = d.tippingOpen !== undefined ? d.tippingOpen : true;
  S.entryDates = d.entryDates || {};
  S.finishedTippers = d.finishedTippers || {};
}

function load() {
  // Load from localStorage immediately so the app starts fast
  try {
    const d = JSON.parse(localStorage.getItem(STORE_KEY) || '{}');
    applyData(d);
  } catch(e) {}
  // Then pull from cloud in background and merge (cloud wins as source of truth)
  cloudLoad().then(d => {
    if (d) {
      applyData(d);
      localStorage.setItem(STORE_KEY, JSON.stringify(d));
      render();
    }
  });
}

function save() {
  const data = buildSaveData();
  // Always save to localStorage immediately
  localStorage.setItem(STORE_KEY, JSON.stringify(data));
  // Debounce cloud save so rapid clicks don't hammer the API
  clearTimeout(_cloudSaveTimer);
  _cloudSaveTimer = setTimeout(() => cloudSave(data), 1200);
}

function calcGroupPts(name) {
  let pts = 0;
  for (const g of Object.keys(GROUPS))
    for (const m of getMatches(g)) {
      const s = S.scores[m.id]; const p = (S.picks[name]||{})[m.id];
      if (!s || !p || s.home==='' || s.away==='') continue;
      const actual = s.home > s.away ? 'H' : s.home < s.away ? 'A' : 'D';
      if (p === actual) pts++;
    }
  return pts;
}

function calcKoPts(name) {
  let pts = 0;
  const myko = S.koPicks[name] || {};
  for (const round of KO_ROUNDS) {
    const picks = myko[round.id] || [];
    const scores = S.koScores[round.id] || [];
    for (const team of picks) {
      if (scores.includes(team)) pts += round.pts;
    }
  }
  return pts;
}

function calcTotal(name) { return calcGroupPts(name) + calcKoPts(name); }

function totalPlayed() {
  let c = 0;
  for (const g of Object.keys(GROUPS))
    for (const m of getMatches(g)) {
      const s = S.scores[m.id];
      if (s && s.home !== '' && s.away !== '') c++;
    }
  return c;
}

function render() {
  const nav = document.getElementById('topbar-nav');
  const main = document.getElementById('main-content');

  // Capture scroll positions before DOM replacement
  const scrollY = window.scrollY;
  // Save scroll positions of all scrollable KO containers by round id
  const koScrolls = {};
  document.querySelectorAll('[data-ko-scroll]').forEach(el => {
    koScrolls[el.dataset.koScroll] = el.scrollTop;
  });

  if (S.view === 'home') {
    nav.innerHTML = `<button class="nav-btn" onclick="goAdmin()">Admin</button>`;
    main.innerHTML = renderHome();
  } else if (S.view === 'tipper') {
    nav.innerHTML = `
      <span style="font-size:13px;color:var(--text2);margin-right:8px">${S.tipperName}</span>
      <button class="nav-btn" onclick="S.view='home';render()">Exit</button>`;
    main.innerHTML = renderTipper();
  } else if (S.view === 'admin') {
    nav.innerHTML = `<button class="nav-btn active">Admin</button><button class="nav-btn" onclick="S.adminAuthed=false;S.view='home';render()">Logout</button>`;
    main.innerHTML = renderAdmin();
  }

  // Restore scroll positions after paint — rAF ensures DOM is laid out
  requestAnimationFrame(() => {
    window.scrollTo(0, scrollY);
    document.querySelectorAll('[data-ko-scroll]').forEach(el => {
      const saved = koScrolls[el.dataset.koScroll];
      if (saved !== undefined) el.scrollTop = saved;
    });
  });
}

function startTipping() {
  const v = document.getElementById('name-inp').value.trim();
  if (!v) { const e=document.getElementById('name-err'); e.textContent='Enter your name'; e.style.display='block'; return; }
  // Block new entries after June 11
  const isNewEntrant = !S.picks[v] || Object.keys(S.picks[v]).length === 0;
  if (isNewEntrant && isTippingLocked()) {
    const e=document.getElementById('name-err'); e.textContent='Tipping is closed — no new entries after 11 June 2026'; e.style.display='block'; return;
  }
  S.tipperName = v;
  if (!S.picks[v]) S.picks[v] = {};
  if (!S.lockedGroups[v]) S.lockedGroups[v] = {};
  if (!S.koPicks[v]) S.koPicks[v] = {};
  if (!S.koLocked[v]) S.koLocked[v] = {};
  // Record first entry date
  if (!S.entryDates[v]) {
    S.entryDates[v] = new Date().toISOString();
    save();
  }
  S.view = 'tipper'; S.tipperTab = 'groups'; S.tipperGroup = 'A';
  render();
}

function renderKnockoutPicker() {
  const name = S.tipperName;
  const myko = S.koPicks[name] || {};
  const koLocked = S.koLocked[name] || {};

  const intro = `
    <div class="ko-intro">
      <p>Predict which teams will advance through each knockout round. <strong style="color:var(--gold)">Your picks cascade</strong> — teams you pick for the Round of 32 become your available pool for the Round of 16, and so on.</p>
      <div class="ko-scoring">
        <span class="badge badge-blue">Round of 32: 1pt each</span>
        <span class="badge badge-blue">Round of 16: 1pt each</span>
        <span class="badge badge-gold">Quarter-finals: 3pts each</span>
        <span class="badge badge-gold">Semi-finals: 3pts each</span>
        <span class="badge badge-red">Final winner: 5pts</span>
      </div>
    </div>`;

  const rounds = KO_ROUNDS.map((round, roundIdx) => {
    const picks = myko[round.id] || [];
    const isLocked = koLocked[round.id];
    const scores = S.koScores[round.id] || [];
    const availableTeams = getAvailableTeamsForRound(round.id);
    const isFirstRound = roundIdx === 0;

    // For rounds after R32: check if previous round has enough picks
    let prevRoundComplete = true;
    if (!isFirstRound) {
      const prevRound = KO_ROUNDS[roundIdx - 1];
      const prevPicks = myko[prevRound.id] || [];
      prevRoundComplete = prevPicks.length === prevRound.count;
    }

    let teamsHtml = '';
    if (!isFirstRound && !prevRoundComplete) {
      const prevRound = KO_ROUNDS[roundIdx - 1];
      teamsHtml = `<div style="padding:16px;text-align:center;color:var(--text3);font-size:13px">
        &#x1F512; Complete your <strong style="color:var(--gold)">${prevRound.label}</strong> picks first — your selections there will populate this round.
      </div>`;
    } else {
      teamsHtml = availableTeams.map(team => {
        const sel = picks.includes(team);
        const isCorrect = scores.length > 0 && scores.includes(team);
        const isWrong = scores.length > 0 && !scores.includes(team) && sel;
        let rowCls = sel ? 'selected' : '';
        if (isLocked) rowCls += ' locked-pick';
        let indicator = '';
        if (sel && scores.length > 0) indicator = isCorrect
          ? '<span style="color:var(--correct);font-size:11px;margin-left:auto">&#x2713;</span>'
          : '<span style="color:var(--red);font-size:11px;margin-left:auto">&#x2717;</span>';
        const clickable = !isLocked && !isTippingLocked();
        return `<div class="ko-pick-row ${rowCls}" onclick="${clickable ? `toggleKoPick('${round.id}',${round.count},'${team.replace(/'/g,"\\'")}')` : ''}">
          <div class="ko-team-dot ${sel?'sel':''}"></div>
          <span class="ko-team-name">${team}</span>
          ${indicator}
        </div>`;
      }).join('');
    }

    const poolNote = !isFirstRound && prevRoundComplete
      ? `<p style="font-size:12px;color:var(--text3);margin-bottom:8px">&#x1F4CB; Showing your ${availableTeams.length} picks from the previous round</p>` : '';

    return `<div class="ko-round-section">
      <div class="ko-round-title">${round.label} <span class="pts">${round.pts} PT${round.pts>1?'S':''} EACH</span>
        ${isLocked ? '<span class="badge badge-green" style="font-size:10px">Locked</span>' : ''}
      </div>
      <div class="ko-intro" style="margin-bottom:1rem">
        <p style="font-size:13px">Pick <strong style="color:var(--gold)">${round.count}</strong> team${round.count>1?'s':''} to reach the ${round.label}. Selected: <strong style="color:${picks.length===round.count?'var(--correct)':'var(--gold)'}">${picks.length}/${round.count}</strong></p>
      </div>
      ${poolNote}
      <div data-ko-scroll="${round.id}" style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);max-height:300px;overflow-y:auto;padding:8px 12px">
        ${teamsHtml}
      </div>
      <div style="margin-top:10px;display:flex;justify-content:flex-end">
        ${!isLocked && !isTippingLocked() ? `<button class="btn btn-gold btn-sm" ${picks.length!==round.count||(!isFirstRound&&!prevRoundComplete)?'disabled':''} onclick="lockKoRound('${round.id}')">Lock ${round.label}</button>` : ''}
      </div>
    </div>`;
  }).join('');

  return intro + rounds;
}

function setPick(matchId, pick) {
  if (!S.picks[S.tipperName]) S.picks[S.tipperName] = {};
  S.picks[S.tipperName][matchId] = pick;
  save(); render();
}

function lockGroup(g) {
  if (!S.lockedGroups[S.tipperName]) S.lockedGroups[S.tipperName] = {};
  S.lockedGroups[S.tipperName][g] = true;
  save(); render();
}

function getAvailableTeamsForRound(roundId) {
  // r32: all teams; subsequent rounds: only teams picked in the previous round
  const roundIds = KO_ROUNDS.map(r => r.id);
  const idx = roundIds.indexOf(roundId);
  if (idx <= 0) return Object.values(GROUPS).flat().sort();
  const prevRoundId = roundIds[idx - 1];
  const myko = S.koPicks[S.tipperName] || {};
  const prevPicks = myko[prevRoundId] || [];
  return prevPicks.slice().sort();
}

function cascadeKoPicks(fromRoundId) {
  // After changing picks for fromRoundId, trim all later rounds to only include valid teams
  const roundIds = KO_ROUNDS.map(r => r.id);
  const startIdx = roundIds.indexOf(fromRoundId) + 1;
  const myko = S.koPicks[S.tipperName];
  if (!myko) return;
  for (let i = startIdx; i < roundIds.length; i++) {
    const rid = roundIds[i];
    const available = getAvailableTeamsForRound(rid);
    if (myko[rid]) {
      myko[rid] = myko[rid].filter(t => available.includes(t));
    }
    // Also un-lock rounds that now have invalid picks
    if (S.koLocked[S.tipperName] && S.koLocked[S.tipperName][rid]) {
      const round = KO_ROUNDS[i];
      if (!myko[rid] || myko[rid].length !== round.count) {
        delete S.koLocked[S.tipperName][rid];
      }
    }
  }
}

function toggleKoPick(roundId, max, team) {
  if (!S.koPicks[S.tipperName]) S.koPicks[S.tipperName] = {};
  if (!S.koPicks[S.tipperName][roundId]) S.koPicks[S.tipperName][roundId] = [];
  const arr = S.koPicks[S.tipperName][roundId];
  const idx = arr.indexOf(team);
  if (idx > -1) arr.splice(idx, 1);
  else if (arr.length < max) arr.push(team);
  cascadeKoPicks(roundId);
  save(); render();
}

function lockKoRound(roundId) {
  if (!S.koLocked[S.tipperName]) S.koLocked[S.tipperName] = {};
  S.koLocked[S.tipperName][roundId] = true;
  save(); render();
}

        <h3 style="font-family:'Barlow Condensed';font-size:18px;font-weight:700;margin-bottom:8px;letter-spacing:0.5px">Points system</h3>
        <table style="font-size:13px;color:var(--text2);border-collapse:collapse;width:100%">
          <tr><td style="padding:5px 0">Group stage correct result</td><td style="color:var(--gold);font-weight:600;text-align:right">1 pt</td></tr>
          <tr><td style="padding:5px 0;border-top:1px solid var(--border)">Round of 32 / 16 correct team</td><td style="color:var(--gold);font-weight:600;text-align:right;border-top:1px solid var(--border)">1 pt</td></tr>
          <tr><td style="padding:5px 0;border-top:1px solid var(--border)">Quarter-final / Semi-final correct</td><td style="color:var(--gold);font-weight:600;text-align:right;border-top:1px solid var(--border)">3 pts</td></tr>
          <tr><td style="padding:5px 0;border-top:1px solid var(--border)">Correct World Cup winner</td><td style="color:var(--gold);font-weight:600;text-align:right;border-top:1px solid var(--border)">5 pts</td></tr>
        </table>
      </div>`;
  }

  return `
    <div class="section-header">
      <h2>ADMIN PANEL</h2>
    </div>
    <div class="tab-row">${tabs}</div>
    ${content}`;
}

function adminLogin() {
  if (document.getElementById('ap').value === ADMIN_PASS) { S.adminAuthed=true; render(); }
  else { document.getElementById('ap-err').style.display='block'; }
}

function saveScores() {
  const g = S.adminGroup;
  for (const m of getMatches(g)) {
    const h = document.getElementById(`sc-${m.id}-h`);
    const a = document.getElementById(`sc-${m.id}-a`);
    if (!h||!a) continue;
    const hv = h.value, av = a.value;
    if (hv===''||av==='') continue;
    S.scores[m.id] = {home:parseInt(hv), away:parseInt(av)};
  }
  save();
  const el = document.getElementById('scores-ok');
  if (el) { el.style.display='inline'; setTimeout(()=>{ if(el) el.style.display='none'; }, 2000); }
}

function toggleKoScore(roundId, max, team) {
  if (!S.koScores[roundId]) S.koScores[roundId] = [];
  const arr = S.koScores[roundId];
  const idx = arr.indexOf(team);
  if (idx > -1) arr.splice(idx, 1);
  else if (arr.length < max) arr.push(team);
  save(); render();
}

initFirebase();
load();
render();
</script>
</body>
</html>
